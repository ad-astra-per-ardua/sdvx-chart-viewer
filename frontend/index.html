<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04060b" />
    <title>SDVX Megamix Chart Viewer</title>
    <link rel="preconnect" href="https://rajqellsaolsgjtfhdnm.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://rajqellsaolsgjtfhdnm.supabase.co" />
    <link rel="preload" as="fetch" href="/api/songs" crossorigin="anonymous" />
    <link rel="preload" as="fetch" href="/api/meta" crossorigin="anonymous" />
    <style>
      html,body,#root{margin:0;padding:0;height:100%;background:#04060b;color:#e6e8ee;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Apple SD Gothic Neo",sans-serif}
      .pre-skeleton{max-width:1600px;margin:0 auto;padding:24px;display:grid;grid-template-columns:280px 1fr;gap:24px}
      .pre-skeleton .pre-header{grid-column:1/-1;height:80px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px}
      .pre-skeleton .pre-quick{grid-column:1/-1;height:60px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px}
      .pre-skeleton .pre-side{height:420px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px}
      .pre-skeleton .pre-main{height:564px;background:rgba(255,255,255,0.01);border-radius:12px}
      @media (max-width:760px){.pre-skeleton{grid-template-columns:1fr;padding:12px;gap:12px}.pre-skeleton .pre-side{height:160px}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="pre-skeleton" aria-hidden="true">
        <div class="pre-header"></div>
        <div class="pre-quick"></div>
        <div class="pre-side"></div>
        <div class="pre-main"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
